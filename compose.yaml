# OSS-friendly docker compose: generates secrets automatically, then brings up services.

x-app-sandbox-env: &app-sandbox-env
  SANDBOX_COMPUTE_BACKEND: ${SANDBOX_COMPUTE_BACKEND:-http}
  SANDBOX_COMPUTE_API_URL: ${SANDBOX_COMPUTE_API_URL:-http://sandbox-compute:8080}
  SANDBOX_COMPUTE_API_TOKEN: ${SANDBOX_COMPUTE_API_TOKEN:-dev-sandbox-token}

services:
  bootstrap-env:
    image: python:3.13-slim
    command: python /app/docker/bootstrap/runtime_env.py
    volumes:
      - .:/app:ro
      - runtime-config:/config
      - static-data:/static
      - media-data:/media
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gobii}
      POSTGRES_DB: ${POSTGRES_DB:-gobii}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-${REDIS_URL:-redis://redis:6379/0}}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-${REDIS_URL:-redis://redis:6379/0}}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-}
      GOBII_ENCRYPTION_KEY: ${GOBII_ENCRYPTION_KEY:-}
      MINIO_ROOT_USER_PREFIX: ${MINIO_ROOT_USER_PREFIX:-gobii}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-}
      APP_UID: ${APP_UID:-101}
      APP_GID: ${APP_GID:-102}
    restart: "no"

  db:
    image: postgres:16
    depends_on:
      bootstrap-env:
        condition: service_completed_successfully
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gobii}
      POSTGRES_USER: ${POSTGRES_USER:-gobii}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres-password
    volumes:
      - db-data:/var/lib/postgresql/data
      - runtime-config:/run/secrets:ro
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gobii}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 3s
    restart: unless-stopped

  sandbox-compute:
    platform: linux/amd64
    build:
      context: ./sandbox_server
      dockerfile: ./Dockerfile
    environment:
      SANDBOX_COMPUTE_API_TOKEN: ${SANDBOX_COMPUTE_API_TOKEN:-dev-sandbox-token}
      SANDBOX_WORKSPACE_ROOT: /workspace
      SANDBOX_RUNTIME_CACHE_ROOT: /runtime-cache
    volumes:
      - sandbox-workspace-data:/workspace
      - sandbox-runtime-cache:/runtime-cache
    
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  web:
    platform: linux/amd64
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    environment:
      <<: *app-sandbox-env
    depends_on:
      bootstrap-env:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
      collectstatic:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >-
      bash -lc "set -a && source /config/django.env && exec gunicorn config.asgi:application -k uvicorn.workers.UvicornWorker --workers ${GUNICORN_WORKERS:-4} --bind 0.0.0.0:8000 --graceful-timeout 30 --timeout 0"
    volumes:
      - media-data:/app/mediafiles
      - static-data:/app/staticfiles
      - runtime-config:/config:ro
    
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/healthz/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  worker:
    platform: linux/amd64
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    environment:
      <<: *app-sandbox-env
    depends_on:
      bootstrap-env:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >-
      bash -lc "set -a && source /config/django.env && exec celery -A config worker -l info"
    volumes:
      - runtime-config:/config:ro
      - media-data:/app/mediafiles
      - static-data:/app/staticfiles
    shm_size: 2gb
    restart: unless-stopped

  beat:
    platform: linux/amd64
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    environment:
      <<: *app-sandbox-env
    depends_on:
      bootstrap-env:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >-
      bash -lc "set -a && source /config/django.env && python manage.py sync_schedules && exec celery -A config beat --loglevel=info --scheduler=redbeat.RedBeatScheduler"
    volumes:
      - runtime-config:/config:ro
      - media-data:/app/mediafiles
      - static-data:/app/staticfiles
    shm_size: 2gb
    restart: unless-stopped
    profiles: ["beat"]

  imap-idlers:
    platform: linux/amd64
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    environment:
      <<: *app-sandbox-env
    depends_on:
      bootstrap-env:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >-
      bash -lc "set -a && source /config/django.env && export IMAP_IDLE_ENABLED=true && exec python manage.py run_imap_idlers"
    volumes:
      - runtime-config:/config:ro
      - media-data:/app/mediafiles
      - static-data:/app/staticfiles
    restart: unless-stopped
    profiles: ["email"]

  flower:
    image: mher/flower:2.0
    depends_on:
      redis:
        condition: service_healthy
    command: celery flower --broker=redis://redis:6379/0 --port=${FLOWER_PORT:-5555}
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - FLOWER_BASIC_AUTH=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-admin}
    
    restart: unless-stopped
    profiles: ["obs"]

  migrate:
    platform: linux/amd64
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    environment:
      <<: *app-sandbox-env
    depends_on:
      bootstrap-env:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    command: >-
      bash -lc "set -a && source /config/django.env && exec python manage.py migrate --noinput"
    volumes:
      - runtime-config:/config:ro
      - media-data:/app/mediafiles
      - static-data:/app/staticfiles
    restart: "no"

  collectstatic:
    platform: linux/amd64
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    environment:
      <<: *app-sandbox-env
    depends_on:
      bootstrap-env:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    command: >-
      bash -lc "set -a && source /config/django.env && exec python manage.py collectstatic --noinput"
    volumes:
      - runtime-config:/config:ro
      - media-data:/app/mediafiles
      - static-data:/app/staticfiles
    restart: "no"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9090"
    depends_on:
      bootstrap-env:
        condition: service_completed_successfully
    environment:
      MINIO_ROOT_USER_FILE: /run/secrets/minio-root-user
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio-root-password
   
    volumes:
      - minio-data:/data
      - runtime-config:/run/secrets:ro
    restart: unless-stopped
    profiles: ["object-storage"]


volumes:
  db-data:
  media-data:
  static-data:
  minio-data:
  runtime-config:
  sandbox-workspace-data:
  sandbox-runtime-cache:
