# Developer-oriented compose stack retaining the previous defaults.
# Run with `docker compose -f docker-compose.dev.yaml up -d` to launch the core
# backing services (Postgres, Redis, MinIO). Enable additional profiles for
# containers such as `web` or `worker` when you need them.

x-app-sandbox-env: &app-sandbox-env
  SANDBOX_COMPUTE_BACKEND: ${SANDBOX_COMPUTE_BACKEND:-http}
  SANDBOX_COMPUTE_API_URL: ${SANDBOX_COMPUTE_API_URL:-http://sandbox-compute:8080}
  SANDBOX_COMPUTE_API_TOKEN: ${SANDBOX_COMPUTE_API_TOKEN:-dev-sandbox-token}

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-gobii}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 3s

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9090"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "127.0.0.1:${MINIO_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9090}:9090"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb --ignore-existing local/gobii;
      exit 0;
      "
    profiles: ["web", "worker", "beat", "imap"]

  sandbox-compute:
    platform: linux/amd64
    build:
      context: ./sandbox_server
      dockerfile: ./Dockerfile
    environment:
      SANDBOX_COMPUTE_API_TOKEN: ${SANDBOX_COMPUTE_API_TOKEN:-dev-sandbox-token}
      SANDBOX_WORKSPACE_ROOT: /workspace
      SANDBOX_RUNTIME_CACHE_ROOT: /runtime-cache
    volumes:
      - sandbox-workspace-data:/workspace
      - sandbox-runtime-cache:/runtime-cache
    ports:
      - "127.0.0.1:${SANDBOX_COMPUTE_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  web:
    platform: linux/amd64
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    environment:
      <<: *app-sandbox-env
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-insecure}
      GOBII_ENCRYPTION_KEY: ${GOBII_ENCRYPTION_KEY:-dev-insecure}
      POSTGRES_HOST: db
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-gobii}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      BRIGHT_DATA_TOKEN: ${BRIGHT_DATA_TOKEN:-}
      BRIGHT_DATA_WEB_UNLOCKER_ZONE: ${BRIGHT_DATA_WEB_UNLOCKER_ZONE:-}
      REDIS_URL: redis://redis:6379/0
      XDG_DATA_HOME: /tmp/.chrome
      XDG_CONFIG_HOME: /tmp/.chrome
      XDG_CACHE_HOME: /tmp/.chrome
    ports:
      - "8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: >-
      bash -lc "gunicorn config.asgi:application -k uvicorn.workers.UvicornWorker --workers ${GUNICORN_WORKERS:-4} --bind 0.0.0.0:8000 --graceful-timeout 30 --timeout 0"
    profiles: ["web"]

  flower:
    image: mher/flower:2.0
    command: celery flower --broker=redis://redis:6379/0 --port=${FLOWER_PORT:-5555}
    ports:
      - "${FLOWER_PORT:-5555}:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - FLOWER_BASIC_AUTH=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-admin}
    depends_on:
      - redis
    restart: unless-stopped
    profiles: ["obs"]

# --------------------------------------------------------------------- #
#  Optional Celery worker (disabled unless profile "worker" is enabled)
# --------------------------------------------------------------------- #
  worker:
    platform: linux/amd64
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    command: celery -A config worker -l info
    environment:
      <<: *app-sandbox-env
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-insecure}
      GOBII_ENCRYPTION_KEY: ${GOBII_ENCRYPTION_KEY:-dev-insecure}
      POSTGRES_HOST: db
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-gobii}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      BRIGHT_DATA_TOKEN: ${BRIGHT_DATA_TOKEN:-}
      BRIGHT_DATA_WEB_UNLOCKER_ZONE: ${BRIGHT_DATA_WEB_UNLOCKER_ZONE:-}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      REDIS_URL: redis://redis:6379/0
      XDG_DATA_HOME: /tmp/.chrome
      XDG_CONFIG_HOME: /tmp/.chrome
      XDG_CACHE_HOME: /tmp/.chrome
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    shm_size: 2gb
    profiles: ["worker"]

  # --------------------------------------------------------------------- #
  #  Optional Celery beat scheduler (disabled unless profile "beat" is enabled)
  # --------------------------------------------------------------------- #
  beat:
    platform: linux/amd64
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    command: >-
      bash -lc "python manage.py sync_schedules && celery -A config beat --loglevel=info --scheduler=redbeat.RedBeatScheduler"
    environment:
      <<: *app-sandbox-env
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-insecure}
      GOBII_ENCRYPTION_KEY: ${GOBII_ENCRYPTION_KEY:-dev-insecure}
      POSTGRES_HOST: db
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-gobii}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      BRIGHT_DATA_TOKEN: ${BRIGHT_DATA_TOKEN:-}
      BRIGHT_DATA_WEB_UNLOCKER_ZONE: ${BRIGHT_DATA_WEB_UNLOCKER_ZONE:-}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      REDIS_URL: redis://redis:6379/0
      XDG_DATA_HOME: /tmp/.chrome
      XDG_CONFIG_HOME: /tmp/.chrome
      XDG_CACHE_HOME: /tmp/.chrome
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    shm_size: 2gb
    profiles: ["beat"]

  # --------------------------------------------------------------------- #
  #  IMAP IDLE watchers (keeps IMAP IDLE connections and enqueues polls)
  # --------------------------------------------------------------------- #
  imap-idlers:
    platform: linux/amd64
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    command: >-
      bash -lc "python manage.py run_imap_idlers"
    environment:
      <<: *app-sandbox-env
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-insecure}
      GOBII_ENCRYPTION_KEY: ${GOBII_ENCRYPTION_KEY:-dev-insecure}
      POSTGRES_HOST: db
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-gobii}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      BRIGHT_DATA_TOKEN: ${BRIGHT_DATA_TOKEN:-}
      BRIGHT_DATA_WEB_UNLOCKER_ZONE: ${BRIGHT_DATA_WEB_UNLOCKER_ZONE:-}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      REDIS_URL: redis://redis:6379/0
      IMAP_IDLE_ENABLED: "true"
      XDG_DATA_HOME: /tmp/.chrome
      XDG_CONFIG_HOME: /tmp/.chrome
      XDG_CACHE_HOME: /tmp/.chrome
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    profiles: ["imap"]

  # Run DB migrations once, then exit. Other services wait on this.
  migrate:
    platform: linux/amd64
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    command: bash -lc "python manage.py migrate --noinput"
    environment:
      <<: *app-sandbox-env
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-insecure}
      GOBII_ENCRYPTION_KEY: ${GOBII_ENCRYPTION_KEY:-dev-insecure}
      POSTGRES_HOST: db
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-gobii}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      REDIS_URL: redis://redis:${REDIS_PORT:-6379}/0
      XDG_DATA_HOME: /tmp/.chrome
      XDG_CONFIG_HOME: /tmp/.chrome
      XDG_CACHE_HOME: /tmp/.chrome
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      BRIGHT_DATA_TOKEN: ${BRIGHT_DATA_TOKEN:-}
      BRIGHT_DATA_WEB_UNLOCKER_ZONE: ${BRIGHT_DATA_WEB_UNLOCKER_ZONE:-}
      HOME: /tmp
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    profiles: ["web", "worker", "beat", "imap"]

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.128.0
    command: [ "--config=/etc/otel/config.yaml" ]
    volumes:
      - ./docker/otel-collector-config.yaml:/etc/otel/config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"
      - "55679:55679"
    environment:
      GRAFANA_CLOUD_OTLP_ENDPOINT: ${GRAFANA_CLOUD_OTLP_ENDPOINT:-}
      GRAFANA_CLOUD_INSTANCE_ID: ${GRAFANA_CLOUD_INSTANCE_ID:-}
      GRAFANA_CLOUD_API_KEY: ${GRAFANA_CLOUD_API_KEY:-}
    profiles: ["obs"]

volumes:
  db-data:
  minio-data:
  sandbox-workspace-data:
  sandbox-runtime-cache:
